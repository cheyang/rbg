---
# RBAC for the controller to manage the webhook certificate secret.
#
# The in-cluster controller (WebhookCertReconciler) generates a self-signed CA
# via pkg/webhook.CertManager and stores it in the `rbgs-webhook-cert` secret.
# These rules scope the controller to creating that secret and to reading /
# updating only that specific secret by name.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbgs-controller-secret-role
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: rbgs-controller
    app.kubernetes.io/name: rbgs
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
# Allow creating the webhook cert secret if it does not yet exist.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
# Allow reading and updating only the specific webhook cert secret.
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - rbgs-webhook-cert
  verbs:
  - get
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbgs-controller-secret-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: rbgs-controller
    app.kubernetes.io/name: rbgs
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rbgs-controller-secret-role
subjects:
  - kind: ServiceAccount
    name: rbgs-controller-sa
    namespace: {{ .Release.Namespace }}
