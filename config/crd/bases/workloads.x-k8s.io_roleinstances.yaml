---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: roleinstances.workloads.x-k8s.io
spec:
  group: workloads.x-k8s.io
  names:
    kind: RoleInstance
    listKind: RoleInstanceList
    plural: roleinstances
    shortNames:
    - rins
    singular: roleinstance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Overall readiness status
      jsonPath: .status.conditions[?(@.type=='RoleInstanceReady')].status
      name: READY
      type: string
    - description: CreationTimestamp is a timestamp representing the server time when
        this object was created. It is not guaranteed to be set in happens-before
        order across separate operations. Clients may not set this value. It is represented
        in RFC3339 form and is in UTC.
      jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: RoleInstance is the Schema for the roleinstances API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
            type: string
          metadata:
            type: object
          spec:
            description: RoleInstanceSpec defines the desired state of RoleInstance
            properties:
              components:
                description: Components is a list of components, each of which specifies
                  a component and the number of replicas and template for RoleInstance
                  that match the component.
                items:
                  properties:
                    annotations:
                      additionalProperties:
                        type: string
                      description: |-
                        Annotations are additional annotations merged into every pod of this component at
                        creation time.  These are copied from InstanceComponent.
                      type: object
                    labels:
                      additionalProperties:
                        type: string
                      description: |-
                        Labels are additional labels merged into every pod of this component at creation time.
                        These are copied from InstanceComponent.
                      type: object
                    name:
                      description: Name is the type name of the component.
                      type: string
                    serviceName:
                      description: |-
                        ServiceName is the name of the service that governs this RoleInstance Component.
                        This service must exist before the RoleInstance, and is responsible for
                        the network identity of the set.
                      type: string
                    size:
                      description: Size is the number of replicas for Pods that match
                        the PodRule.
                      format: int32
                      type: integer
                    template:
                      description: Template is the template for the component pods.
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - template
                  type: object
                type: array
              readinessGates:
                description: ReadinessGates is an optional list of PodReadinessGates
                  for the whole RoleInstance.
                items:
                  description: RoleInstanceReadinessGate contains the reference to
                    a RoleInstance condition
                  properties:
                    conditionType:
                      description: ConditionType refers to a condition in the pod's
                        condition list with matching type.
                      type: string
                  required:
                  - conditionType
                  type: object
                type: array
              readyPolicy:
                default: AllPodReady
                description: |-
                  RoleInstanceReadyPolicy specifies the policy for determining if the RoleInstance is ready.
                  Defaults to `AllPodReady`
                type: string
              restartPolicy:
                description: RestartPolicy defines the restart policy for all pods
                  within the RoleInstance.
                type: string
              restartPolicyConfig:
                description: |-
                  RestartPolicyConfig tunes the RecreateRoleInstanceOnPodRestart behavior
                  (diagnosis delay and consecutive-rebuild limit). Ignored when RestartPolicy is None.
                properties:
                  maxConsecutiveRebuilds:
                    description: |-
                      MaxConsecutiveRebuilds is the number of consecutive whole-group rebuilds tolerated
                      before the controller stops and marks the instance with RestartBackoffExhausted.
                      0 means unlimited (legacy behavior).
                    format: int32
                    minimum: 0
                    type: integer
                  rebuildDelaySeconds:
                    description: |-
                      RebuildDelaySeconds is the delay between detecting a pod crash and recreating
                      the whole RoleInstance. During this window the crashed pod is preserved so
                      operators can inspect it (e.g.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
            required:
            - components
            type: object
          status:
            description: RoleInstanceStatus defines the observed state of RoleInstance
            properties:
              collisionCount:
                description: CollisionCount is the count of hash collisions for the
                  RoleInstanceSet.
