                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type of RoleInstance condition.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              consecutiveRestarts:
                description: |-
                  ConsecutiveRestarts counts whole-group rebuilds triggered by the restart policy
                  that have not yet been followed by a sustained-Ready instance.
                format: int32
                type: integer
              currentRevision:
                description: CurrentRevision is a hash value that changes when the
                  spec is changed.
                type: string
              inPlaceUpdateContainerBaselines:
                additionalProperties:
                  additionalProperties:
                    description: |-
                      ContainerUpdateBaseline records the pre-update state of a container for
                      distinguishing expected restarts (from in-place image changes) from real crashes.
                    properties:
                      imageID:
                        description: |-
                          ImageID is the container's ImageID before the in-place update.
                          Used to determine if the image actually changed for this container.
                        type: string
                      restartCount:
                        description: RestartCount is the container's RestartCount
                          before the in-place update.
                        format: int32
                        type: integer
                    required:
                    - restartCount
                    type: object
                  type: object
                description: |-
                  InPlaceUpdateContainerBaselines records the pre-update baseline for
                  containers that were in-place updated. Outer key is pod name, inner key
                  is container name.
                type: object
              labelSelector:
                description: LabelSelector of a RoleInstance is a label query over
                  Pods that should match the RoleInstance.
                type: string
              lastCrashInfo:
                description: |-
                  LastCrashInfo records evidence about the crash(es) that triggered the most recent
                  rebuild, for post-hoc diagnosis. It survives pod deletion.
                properties:
                  observedTime:
                    description: ObservedTime is when the controller recorded this
                      crash info.
                    format: date-time
                    type: string
                  pods:
                    description: |-
                      Pods is the list of crashed pods that triggered the rebuild, sorted by
                      termination time (earliest first).
                    items:
                      description: CrashedPod records the diagnostic details of a
                        single crashed pod.
                      properties:
                        container:
                          description: Container is the name of the container whose
                            termination was recorded.
                          type: string
                        exitCode:
                          description: ExitCode is the exit code of the terminated
                            container.
                          format: int32
                          type: integer
                        finishedAt:
                          description: FinishedAt is when the container terminated.
                          format: date-time
                          type: string
                        likelyRootCause:
                          description: LikelyRootCause marks the earliest-terminated
                            crasher. Best-effort, not a guarantee.
                          type: boolean
                        nodeName:
                          description: NodeName is the node the crashed pod was scheduled
                            on.
                          type: string
                        podName:
                          description: PodName is the name of the crashed pod.
                          type: string
                        reason:
                          description: Reason is the termination reason of the container
                            (e.g. Error, OOMKilled).
                          type: string
                        restartCount:
                          description: RestartCount is the container RestartCount
                            observed at capture time.
                          format: int32
                          type: integer
                      required:
                      - podName
                      type: object
                    type: array
                required:
                - observedTime
                type: object
              lastRestartTime:
                description: LastRestartTime is when the most recent restart-policy
