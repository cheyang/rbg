                      format: int32
                      type: integer
                    updatedReplicas:
                      description: UpdatedReplicas is the number of updated Pod for
                        RoleInstance that match the component.
                      format: int32
                      type: integer
                  required:
                  - availableReplicas
                  - name
                  - readyReplicas
                  - scheduledReplicas
                  - size
                  - updatedReadyReplicas
                  - updatedReplicas
                  type: object
                type: array
              conditions:
