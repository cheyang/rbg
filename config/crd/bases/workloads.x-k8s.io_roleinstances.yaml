                      format: int32
                      type: integer
                    size:
                      description: Size is the number of Pod for RoleInstance that
                        match the component.
                      format: int32
                      type: integer
                    updatedReadyReplicas:
                      description: UpdatedReadyReplicas is the number of updated and
